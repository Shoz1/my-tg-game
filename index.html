<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Приключения Кузи: Путь к Лотку</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a2e; font-family: 'VT323', monospace; color: white; user-select: none; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; font-size: 28px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px 0 #000; letter-spacing: 2px; }
        #ui span { color: #f1c40f; } 
        canvas { display: block; image-rendering: pixelated; /* Четкий пиксель-арт */ }
    </style>
</head>
<body>

    <div id="ui">
        Монеты: <span id="coins-val">0</span> / Очки: <span id="score-val">0</span>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    // --- ИНИЦИАЛИЗАЦИЯ И УПРАВЛЕНИЕ ---
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const uiCoins = document.getElementById('coins-val');
    const uiScore = document.getElementById('score-val');

    let width, height, cx, cy, groundY;
    ctx.imageSmoothingEnabled = false; // Отключаем сглаживание

    let gameState = { score: 0, coins: 0, level: 1, isRunning: false, kuzyaStats: { speed: 5, jump: 18 } };

    // --- ЗАГРУЗКА И НАСТРОЙКА СПРАЙТОВ (МАТЕМАТИЧЕСКИ ТОЧНАЯ СЕТКА) ---
    const atlas = new Image();
    atlas.src = 'image_8.png'; // Убедись, что на GitHub лежит ПРОЗРАЧНЫЙ .png файл!
    let isAtlasLoaded = false;
    let SPRITES = {};

    atlas.onload = () => { 
        // Изображение делится на сетку 6 колонок и 3 строки (6x3)
        // Вычисляем базовый размер одного сектора (w x h)
        const w = atlas.width / 6;  
        const h = atlas.height / 3; 

        SPRITES = {
            kuzya: {
                idle: [0, 0, w, h], // Верхний ряд, 1 колонка
                walk: [
                    [w * 0, h, w, h], // Средний ряд, 1 колонка
                    [w * 1, h, w, h], // Средний ряд, 2 колонка
                    [w * 2, h, w, h], // Средний ряд, 3 колонка
                    [w * 3, h, w, h], // Средний ряд, 4 колонка
                    [w * 4, h, w, h]  // Средний ряд, 5 колонка (все 5 кадров ходьбы!)
                ],
                jump: [w * 5, 0, w, h] // Верхний ряд, последняя колонка
            },
            // Препятствия (Нижний ряд)
            marci: [0, h * 2, w, h],              // Нижний ряд, 1 колонка
            rose: [w * 0.9, h * 2, w * 1.5, h],   // Нижний ряд, 2 колонка (Роза длинная и лежачая, чуть увеличиваем ширину)
            pinkLitterbox: [w * 2.8, h * 2, w * 1.3, h], // Цель
            coinGold: [w * 5.2, h * 2, w * 0.6, h * 0.5], // Монета (сверху справа)
            coinFish: [w * 5.2, h * 2.5, w * 0.7, h * 0.4] // Монета-рыбка
        };

        isAtlasLoaded = true; 
        startGame(); 
    };

    const LANES = { COUNT: 3, WIDTH: 0 };

    class GameObject {
        constructor(x, y, w, h, type) {
            this.x = x; this.y = y; this.w = w; this.h = h; this.type = type;
        }
        draw() {
            if (!isAtlasLoaded) return;
            // По умолчанию берем первый кадр или единственные координаты
            const coord = Array.isArray(SPRITES[this.type][0]) ? SPRITES[this.type][0] : SPRITES[this.type];
            if (coord) ctx.drawImage(atlas, ...coord, this.x, this.y, this.w, this.h);
        }
        update(deltaTime) {}
    }

    class Kuzya extends GameObject {
        constructor() {
            // Центрируем спрайт 80x80 в линии
            super(0, 0, 80, 80, 'kuzya'); 
            this.lane = 1; // Старт по центру (0, 1, 2)
            this.targetX = 0;
            this.isJumping = false; this.jumpVelocity = 0;
            this.walkTimer = 0; this.currentWalkFrame = 0;
        }
        draw() {
            if (!isAtlasLoaded) return;
            let coord;
            if (this.isJumping) {
                coord = SPRITES.kuzya.jump;
            } else {
                // Анимация ходьбы Кузи (все 5 кадров)
                coord = SPRITES.kuzya.walk[this.currentWalkFrame];
            }
            ctx.drawImage(atlas, ...coord, this.x, this.y, this.w, this.h);
        }
        update(deltaTime) {
            // 1. Движение между линиями
            this.targetX = (this.lane * LANES.WIDTH) + LANES.WIDTH / 2 - this.w / 2;
            this.x += (this.targetX - this.x) * 0.25; // Сглаживание движения
            
            // 2. Гравитация и прыжок
            this.y = groundY - this.h + 10; // Позиция ног на земле

            if (this.isJumping) {
                this.y -= this.jumpVelocity;
                this.jumpVelocity -= 1.2; 
                if (this.y >= groundY - this.h + 10) {
                    this.y = groundY - this.h + 10;
                    this.isJumping = false;
                }
            } else {
                // Анимация ходьбы
                this.walkTimer += deltaTime;
                if (this.walkTimer > 0.12) { // Интервал переключения кадров
                    this.currentWalkFrame = (this.currentWalkFrame + 1) % SPRITES.kuzya.walk.length;
                    this.walkTimer = 0;
                }
            }
        }
        switchLane(dir) {
            this.lane = Math.max(0, Math.min(LANES.COUNT - 1, this.lane + dir));
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        jump() {
            if (!this.isJumping) {
                this.isJumping = true; this.jumpVelocity = gameState.kuzyaStats.jump;
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            }
        }
    }

    class Obstacle extends GameObject {
        constructor(x, y, w, h, type, speed) { super(x, y, w, h, type); this.speed = speed; }
        update(deltaTime) { this.x -= this.speed * deltaTime * 60; }
    }

    let kuzya, gameObjects = [], gameSpeed = 5, nextObstacleTime = 0;

    const generateLevel = (time) => {
        if (time > nextObstacleTime && gameState.isRunning) {
            const lane = Math.floor(Math.random() * LANES.COUNT);
            const xSpawn = width + 50;
            const ySpawn = groundY;

            const typeProb = Math.random();
            if (typeProb > 0.6) {
                const isFish = Math.random() < 0.2; 
                gameObjects.push(new Obstacle(xSpawn, ySpawn - 70, 40, 40, isFish ? 'coinFish' : 'coinGold', gameSpeed));
            } else if (typeProb > 0.2) {
                const isMarci = Math.random() > 0.5;
                const catType = isMarci ? 'marci' : 'rose';
                const catW = isMarci ? 65 : 85; const catH = isMarci ? 60 : 55; 
                gameObjects.push(new Obstacle(xSpawn, groundY - catH + 10, catW, catH, catType, gameSpeed));
            }

            nextObstacleTime = time + (1500 - gameState.level * 80);
            if (Math.random() < 0.1) gameState.level++; // Повышение уровня
        }
    };

    let lastTime = 0;
    const loop = (time) => {
        if (!gameState.isRunning || !isAtlasLoaded) return;
        ctx.clearRect(0, 0, width, height);
        const deltaTime = (time - lastTime) / 1000; lastTime = time;

        // Фон земли
        ctx.fillStyle = '#2c3e50'; ctx.fillRect(0, groundY, width, height - groundY);
        // Линии дорожек
        ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 2;
        for(let i=1; i<LANES.COUNT; i++) {
            ctx.beginPath(); ctx.moveTo(i * LANES.WIDTH, groundY); ctx.lineTo(i * LANES.WIDTH, height); ctx.stroke();
        }

        generateLevel(time);
        kuzya.update(deltaTime); kuzya.draw();

        gameObjects.forEach((obj, index) => {
            obj.update(deltaTime); obj.draw();
            // Проверка коллизий
            if (isColliding(kuzya, obj)) {
                if (obj.type.startsWith('coin')) {
                    gameState.coins += (obj.type === 'coinFish' ? 5 : 1);
                    gameState.score += 10;
                    if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                    gameObjects.splice(index, 1);
                } else { endGame(); } // Врезались в кота
            }
            if (obj.x < -obj.w) gameObjects.splice(index, 1);
        });

        uiCoins.innerText = gameState.coins; uiScore.innerText = gameState.score;
        requestAnimationFrame(loop);
    };

    const isColliding = (r1, r2) => {
        // Уменьшенный хитбокс для честности
        const padX = 15; const padY = 15;
        return r1.x + padX < r2.x + r2.w && r1.x + r1.w - padX > r2.x &&
               r1.y + padY < r2.y + r2.h && r1.h + r1.y - padY > r2.y;
    };

    const endGame = () => {
        gameState.isRunning = false;
        if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        alert(`GAME OVER. Собрано монет: ${gameState.coins}`);
        startGame();
    };

    const startGame = () => {
        if (!isAtlasLoaded) return;
        gameState.score = 0; gameState.coins = 0; gameState.level = 1; gameSpeed = 5;
        kuzya = new Kuzya(); gameObjects = []; gameState.isRunning = true;
        if(lastTime === 0) requestAnimationFrame(loop);
    };

    const resize = () => {
        width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight;
        cx = width / 2; cy = height / 2; groundY = height * 0.75; LANES.WIDTH = width / LANES.COUNT;
    };

    window.addEventListener('resize', resize); resize();

    // УПРАВЛЕНИЕ (TOUCH)
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        // Управление: Верхняя половина - прыжок, нижняя половина (лево/право) - линии
        if (touch.clientY < height * 0.5) kuzya.jump();
        else if (touch.clientX < width / 2) kuzya.switchLane(-1);
        else kuzya.switchLane(1);
    }, {passive: false});

</script>
</body>
</html>
